<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#c70d27"><title>Panjat Pinang Merdeka</title><link rel="stylesheet" href="style.css"></head><body>
<main class="game"><header><div class="brand"><span>🇮🇩</span><div><small>MINI GAME KEMERDEKAAN</small><strong>PANJAT PINANG</strong></div></div><button id="sound">🔊</button></header>
<section class="hud"><div><small>WAKTU</small><b><span id="time">45</span> dtk</b></div><div><small>KETINGGIAN</small><b><span id="height">0</span>%</b></div><div><small>STAMINA</small><i><em id="stamina"></em></i></div></section>
<section class="arena"><div class="sun"></div><div class="cloud one">☁</div><div class="cloud two">☁</div><div class="flags" id="flags"></div><div class="houses">⌂　⌂　⌂　⌂</div><div class="prizes">🎁 🏆 🎁 💰</div><div class="pole"></div><div class="climber" id="climber"><span>😤</span><b>🔴</b><i class="al"></i><i class="ar"></i><i class="ll"></i><i class="lr"></i></div><div class="crowd">👩‍🌾 🧑‍🌾 👧 👨‍🌾 🧒 👩‍🌾 👦</div><div class="grass"></div><div class="combo" id="combo"></div></section>
<div class="status"><span id="message">Tekan MULAI untuk mengikuti lomba!</span><b id="displayName">PEJUANG</b></div>
<section class="start-panel" id="startPanel"><label>NAMA PEMAIN<input id="name" maxlength="14" value="PEJUANG"></label><button id="start">MULAI PANJAT ›</button><p>Tekan kiri dan kanan secara bergantian</p></section>
<section class="controls hidden" id="controls"><button id="left"><span>👈</span> KIRI <small>A</small></button><button id="right"><span>👉</span> KANAN <small>D</small></button></section>
<section class="result hidden" id="result"><div><span id="resultIcon">🏆</span><small id="resultTop">JUARA PANJAT PINANG</small><h1 id="resultTitle">MERDEKA!</h1><p id="resultText"></p><button class="gift" id="gift">BUKA HADIAH 🎁</button><button class="again" id="again">MAIN LAGI</button></div></section>
</main><script src="game.js"></script></body></html>
